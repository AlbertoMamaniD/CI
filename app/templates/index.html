<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suma Pro | Calculadora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Suma dos números</h1>
        <form action="/" method="post">
            <div class="form-group">
                <input type="number" name="a" placeholder="Primer número" required>
                <input type="number" name="b" placeholder="Segundo número" required>
            </div>
            <button type="submit">Calcular Suma</button>
        </form>
        
        {% if resultado is not none %}
        <div class="result">
            <p>Resultado: <span>{{ resultado }}</span></p>
        </div>
        {% endif %}
    </div>
</body>
</html>
